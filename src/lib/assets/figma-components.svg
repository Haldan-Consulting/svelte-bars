<svg width="1680" height="980" viewBox="0 0 1680 980" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="pageBg" x1="0" y1="0" x2="1680" y2="980" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#4A4A4A"/>
