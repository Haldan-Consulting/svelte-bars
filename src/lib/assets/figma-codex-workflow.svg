<svg width="2100" height="760" viewBox="0 0 2100 760" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="2100" y2="760" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#4A4A4A"/>
      <stop offset="1" stop-color="#2D2D2D"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-30%" width="160%" height="200%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M1 1L11 6L1 11V1Z" fill="#E9E9E9"/>
    </marker>
  </defs>

  <rect width="2100" height="760" fill="url(#bg)"/>

  <g id="title">
    <text x="72" y="86" fill="white" font-family="Arial, sans-serif" font-size="48" font-weight="700">Figma / Codex Workflow</text>
    <text x="72" y="126" fill="#E3E3E3" font-family="Arial, sans-serif" font-size="22">Code-first hybrid workflow for chart and machine components in this repo.</text>
  </g>

  <g id="lane" filter="url(#shadow)">
    <rect x="48" y="170" width="2004" height="520" rx="28" fill="rgba(12,12,12,0.22)" stroke="rgba(255,255,255,0.14)"/>
  </g>

  <g id="nodes" font-family="Arial, sans-serif">
    <g id="request" filter="url(#shadow)">
      <rect x="96" y="300" width="178" height="96" rx="18" fill="#202020" stroke="#4A4A4A" stroke-width="2"/>
      <text x="185" y="338" text-anchor="middle" fill="white" font-size="22" font-weight="700">Request</text>
      <text x="185" y="366" text-anchor="middle" fill="#D7D7D7" font-size="16">New component</text>
      <text x="185" y="388" text-anchor="middle" fill="#D7D7D7" font-size="16">or revision</text>
    </g>

    <g id="decision" filter="url(#shadow)">
      <path d="M402 252L502 348L402 444L302 348L402 252Z" fill="#202020" stroke="#4A4A4A" stroke-width="2"/>
      <text x="402" y="332" text-anchor="middle" fill="white" font-size="18" font-weight="700">Concept</text>
      <text x="402" y="356" text-anchor="middle" fill="#D7D7D7" font-size="15">still loose?</text>
    </g>

    <g id="figma-sketch" filter="url(#shadow)">
      <rect x="572" y="206" width="210" height="110" rx="18" fill="#202020" stroke="#F9F200" stroke-width="2"/>
      <text x="677" y="246" text-anchor="middle" fill="white" font-size="22" font-weight="700">Rough Figma</text>
      <text x="677" y="274" text-anchor="middle" fill="#D7D7D7" font-size="16">Sketch intent, data,</text>
      <text x="677" y="296" text-anchor="middle" fill="#D7D7D7" font-size="16">and sub-elements</text>
    </g>

    <g id="code-first" filter="url(#shadow)">
      <rect x="572" y="382" width="210" height="110" rx="18" fill="#202020" stroke="#4A4A4A" stroke-width="2"/>
      <text x="677" y="420" text-anchor="middle" fill="white" font-size="22" font-weight="700">Build In Code</text>
      <text x="677" y="448" text-anchor="middle" fill="#D7D7D7" font-size="16">Svelte component</text>
      <text x="677" y="470" text-anchor="middle" fill="#D7D7D7" font-size="16">is source of truth</text>
    </g>

    <g id="shared-system" filter="url(#shadow)">
      <rect x="866" y="382" width="226" height="110" rx="18" fill="#202020" stroke="#4A4A4A" stroke-width="2"/>
      <text x="979" y="418" text-anchor="middle" fill="white" font-size="22" font-weight="700">Shared System</text>
      <text x="979" y="446" text-anchor="middle" fill="#D7D7D7" font-size="16">Tokens and helpers</text>
      <text x="979" y="468" text-anchor="middle" fill="#D7D7D7" font-size="16">shared, geometry local</text>
    </g>

    <g id="anatomy" filter="url(#shadow)">
      <rect x="1178" y="382" width="226" height="110" rx="18" fill="#202020" stroke="#4A4A4A" stroke-width="2"/>
      <text x="1291" y="418" text-anchor="middle" fill="white" font-size="22" font-weight="700">Document Anatomy</text>
      <text x="1291" y="446" text-anchor="middle" fill="#D7D7D7" font-size="16">Glossary comments</text>
      <text x="1291" y="468" text-anchor="middle" fill="#D7D7D7" font-size="16">stay aligned with code</text>
    </g>

    <g id="validate" filter="url(#shadow)">
      <rect x="1490" y="382" width="226" height="110" rx="18" fill="#202020" stroke="#4A4A4A" stroke-width="2"/>
      <text x="1603" y="418" text-anchor="middle" fill="white" font-size="22" font-weight="700">Validate Behavior</text>
      <text x="1603" y="446" text-anchor="middle" fill="#D7D7D7" font-size="16">Check data, thresholds,</text>
      <text x="1603" y="468" text-anchor="middle" fill="#D7D7D7" font-size="16">responsiveness, math</text>
    </g>

    <g id="exports" filter="url(#shadow)">
      <rect x="1802" y="382" width="202" height="110" rx="18" fill="#202020" stroke="#00CC33" stroke-width="2"/>
      <text x="1903" y="418" text-anchor="middle" fill="white" font-size="22" font-weight="700">Export SVGs</text>
      <text x="1903" y="446" text-anchor="middle" fill="#D7D7D7" font-size="16">Standalone, board,</text>
      <text x="1903" y="468" text-anchor="middle" fill="#D7D7D7" font-size="16">design-system, anatomy</text>
    </g>

    <g id="figma-review" filter="url(#shadow)">
      <rect x="1348" y="552" width="244" height="96" rx="18" fill="#202020" stroke="#F9F200" stroke-width="2"/>
      <text x="1470" y="588" text-anchor="middle" fill="white" font-size="22" font-weight="700">Review In Figma</text>
      <text x="1470" y="616" text-anchor="middle" fill="#D7D7D7" font-size="16">Annotate, compare,</text>
      <text x="1470" y="638" text-anchor="middle" fill="#D7D7D7" font-size="16">present, collect feedback</text>
    </g>

    <g id="feedback" filter="url(#shadow)">
      <path d="M1114 536L1206 600L1114 664L1022 600L1114 536Z" fill="#202020" stroke="#4A4A4A" stroke-width="2"/>
      <text x="1114" y="588" text-anchor="middle" fill="white" font-size="18" font-weight="700">Feedback</text>
      <text x="1114" y="612" text-anchor="middle" fill="#D7D7D7" font-size="15">changes</text>
      <text x="1114" y="634" text-anchor="middle" fill="#D7D7D7" font-size="15">component?</text>
    </g>

    <g id="ready" filter="url(#shadow)">
      <rect x="790" y="552" width="198" height="96" rx="18" fill="#202020" stroke="#00CC33" stroke-width="2"/>
      <text x="889" y="588" text-anchor="middle" fill="white" font-size="22" font-weight="700">Ready</text>
      <text x="889" y="616" text-anchor="middle" fill="#D7D7D7" font-size="16">Code and assets</text>
      <text x="889" y="638" text-anchor="middle" fill="#D7D7D7" font-size="16">aligned</text>
    </g>

    <g id="checks" filter="url(#shadow)">
      <rect x="500" y="552" width="230" height="96" rx="18" fill="#202020" stroke="#4A4A4A" stroke-width="2"/>
      <text x="615" y="588" text-anchor="middle" fill="white" font-size="22" font-weight="700">Acceptance Checks</text>
      <text x="615" y="616" text-anchor="middle" fill="#D7D7D7" font-size="16">README/docs aligned,</text>
      <text x="615" y="638" text-anchor="middle" fill="#D7D7D7" font-size="16">`check` and `build` pass</text>
    </g>
  </g>

  <g id="connectors" stroke="#E9E9E9" stroke-width="3" marker-end="url(#arrow)">
    <path d="M274 348H296"/>
    <path d="M502 348H554"/>
    <path d="M402 444V437H554"/>
    <path d="M782 437H848"/>
    <path d="M1092 437H1160"/>
    <path d="M1404 437H1472"/>
    <path d="M1716 437H1784"/>
    <path d="M1903 492V528H1470V534"/>
    <path d="M1348 600H1224"/>
    <path d="M1022 600H1006"/>
    <path d="M790 600H748"/>
    <path d="M615 552V516H615H660"/>
  </g>

  <g id="labels" font-family="Arial, sans-serif" font-size="16" font-weight="700">
    <text x="536" y="334" fill="#F9F200">Yes</text>
    <text x="516" y="430" fill="#D7D7D7">No</text>
    <text x="995" y="584" fill="#FF2B2B">Yes</text>
    <text x="972" y="584" transform="translate(-122 0)" fill="#00CC33">No</text>
  </g>
</svg>
