<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" role="img" aria-labelledby="title desc">
  <title id="title">Annotated bar chart anatomy</title>
  <desc id="desc">Annotated SVG showing the named sub-elements of the BarChart component.</desc>

  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#535353"/>
      <stop offset="50%" stop-color="#353535"/>
      <stop offset="100%" stop-color="#202020"/>
    </linearGradient>
    <linearGradient id="bar-yellow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffe600"/>
      <stop offset="100%" stop-color="#f9f200"/>
    </linearGradient>
    <linearGradient id="bar-blue" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0d4fa3"/>
      <stop offset="100%" stop-color="#3d7ad6"/>
    </linearGradient>
    <linearGradient id="bar-red" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c40000"/>
      <stop offset="100%" stop-color="#ff2b2b"/>
    </linearGradient>
    <linearGradient id="bar-green" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00a800"/>
      <stop offset="100%" stop-color="#3cff3c"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.55"/>
    </filter>
    <style>
      .canvas { fill: url(#bg); }
      .component-shell { fill: #202020; stroke: #4a4a4a; stroke-width: 2; }
      .frame { fill: none; stroke: #4a4a4a; stroke-width: 2; }
      .grid { stroke: #666666; stroke-width: 2; }
      .axis { fill: #d5d5d5; font: 600 12px Arial, sans-serif; }
      .labels { fill: #ffffff; font: 700 14px Arial, sans-serif; }
      .title { fill: #ffffff; font: 800 20px Arial, sans-serif; }
      .value { font: 800 30px Arial, sans-serif; }
      .callout-line { stroke: #76e6ff; stroke-width: 3; fill: none; }
      .callout-dot { fill: #76e6ff; }
      .callout-box { fill: rgba(10, 10, 10, 0.96); stroke: #76e6ff; stroke-width: 2; rx: 10; }
      .callout-text { fill: #ffffff; font: 700 18px Arial, sans-serif; }
      .callout-accent { fill: #9cefff; font: 600 13px Arial, sans-serif; }
      .slot-outline { fill: rgba(118, 230, 255, 0.08); stroke: #76e6ff; stroke-width: 2; stroke-dasharray: 8 7; }
      .viewbox-outline { fill: rgba(118, 230, 255, 0.05); stroke: #76e6ff; stroke-width: 2; stroke-dasharray: 10 6; }
    </style>
  </defs>

  <rect class="canvas" width="1400" height="900"/>
  <text x="700" y="64" text-anchor="middle" class="title" style="font-size:34px">BarChart Anatomy</text>

  <!-- Component shell -->
  <g transform="translate(360 130)">
    <rect class="component-shell" x="0" y="0" width="680" height="670" rx="18"/>
    <rect class="frame" x="36" y="78" width="608" height="536" rx="18"/>

    <!-- svg/viewBox region -->
    <rect class="viewbox-outline" x="80" y="104" width="520" height="332" rx="8"/>

    <!-- grid lines -->
    <line class="grid" x1="126" y1="138" x2="586" y2="138"/>
    <line class="grid" x1="126" y1="204" x2="586" y2="204"/>
    <line class="grid" x1="126" y1="270" x2="586" y2="270"/>
    <line class="grid" x1="126" y1="336" x2="586" y2="336"/>
    <line class="grid" x1="126" y1="402" x2="586" y2="402"/>

    <!-- axis labels -->
    <text class="axis" x="116" y="142" text-anchor="end">100%</text>
    <text class="axis" x="116" y="208" text-anchor="end">75%</text>
    <text class="axis" x="116" y="274" text-anchor="end">50%</text>
    <text class="axis" x="116" y="340" text-anchor="end">25%</text>
    <text class="axis" x="116" y="406" text-anchor="end">0%</text>

    <!-- one slot highlighted -->
    <rect class="slot-outline" x="138" y="104" width="118" height="332" rx="8"/>

    <!-- bars -->
    <g filter="url(#shadow)">
      <rect x="164" y="152" width="56" height="250" rx="5" fill="url(#bar-yellow)"/>
      <rect x="282" y="176" width="56" height="226" rx="5" fill="url(#bar-blue)"/>
      <rect x="400" y="158" width="56" height="244" rx="5" fill="url(#bar-red)"/>
      <rect x="518" y="225" width="56" height="177" rx="5" fill="url(#bar-green)"/>
    </g>

    <!-- labelBox chips -->
    <rect x="140" y="420" width="114" height="24" rx="4" fill="#2b2b2b"/>
    <rect x="258" y="420" width="114" height="24" rx="4" fill="#2b2b2b"/>
    <rect x="376" y="420" width="114" height="24" rx="4" fill="#2b2b2b"/>
    <rect x="494" y="420" width="114" height="24" rx="4" fill="#2b2b2b"/>
    <text class="labels" x="197" y="437" text-anchor="middle">Availability</text>
    <text class="labels" x="315" y="437" text-anchor="middle">Performance</text>
    <text class="labels" x="433" y="437" text-anchor="middle">Quality</text>
    <text class="labels" x="551" y="437" text-anchor="middle">OEE</text>

    <!-- value row frame -->
    <rect x="126" y="448" width="460" height="52" rx="10" fill="#2b2b2b" stroke="#00cc33" stroke-width="2"/>

    <!-- value row / value / percent -->
    <g class="value">
      <text x="183.5" y="487" text-anchor="middle" fill="#f9f200">84<tspan font-size="21">%</tspan></text>
      <text x="301.5" y="487" text-anchor="middle" fill="#3d7ad6">81<tspan font-size="21">%</tspan></text>
      <text x="419.5" y="487" text-anchor="middle" fill="#ff2b2b">96<tspan font-size="21">%</tspan></text>
      <text x="537.5" y="487" text-anchor="middle" fill="#3cff3c">65<tspan font-size="21">%</tspan></text>
    </g>
  </g>

  <!-- Left-side callouts -->
  <g>
    <path class="callout-line" d="M 330 166 H 240 V 124 H 84"/>
    <circle class="callout-dot" cx="330" cy="166" r="5"/>
    <rect class="callout-box" x="24" y="92" width="170" height="52"/>
    <text class="callout-text" x="40" y="123">chartShell</text>
    <text class="callout-accent" x="40" y="139">outer component card</text>

    <path class="callout-line" d="M 396 242 H 250 V 220 H 84"/>
    <circle class="callout-dot" cx="396" cy="242" r="5"/>
    <rect class="callout-box" x="24" y="188" width="170" height="52"/>
    <text class="callout-text" x="40" y="219">plotFrame</text>
    <text class="callout-accent" x="40" y="235">inner bordered region</text>

    <path class="callout-line" d="M 442 266 H 234 V 316 H 84"/>
    <circle class="callout-dot" cx="442" cy="266" r="5"/>
    <rect class="callout-box" x="24" y="290" width="170" height="52"/>
    <text class="callout-text" x="40" y="321">svg/viewBox</text>
    <text class="callout-accent" x="40" y="337">internal geometry space</text>

    <path class="callout-line" d="M 486 300 H 232 V 412 H 84"/>
    <circle class="callout-dot" cx="486" cy="300" r="5"/>
    <rect class="callout-box" x="24" y="386" width="170" height="52"/>
    <text class="callout-text" x="40" y="417">bar slots</text>
    <text class="callout-accent" x="40" y="433">lane per metric/value</text>

    <path class="callout-line" d="M 524 620 H 242 V 612 H 84"/>
    <circle class="callout-dot" cx="524" cy="620" r="5"/>
    <rect class="callout-box" x="24" y="582" width="170" height="52"/>
    <text class="callout-text" x="40" y="613">valueRow</text>
    <text class="callout-accent" x="40" y="629">slot-aligned value grid</text>
  </g>

  <!-- Right-side callouts -->
  <g>
    <path class="callout-line" d="M 946 268 H 1116 V 132 H 1314"/>
    <circle class="callout-dot" cx="946" cy="268" r="5"/>
    <rect class="callout-box" x="1150" y="100" width="206" height="52"/>
    <text class="callout-text" x="1166" y="131">grid lines</text>
    <text class="callout-accent" x="1166" y="147">horizontal reference guides</text>

    <path class="callout-line" d="M 476 406 H 1110 V 228 H 1314"/>
    <circle class="callout-dot" cx="476" cy="406" r="5"/>
    <rect class="callout-box" x="1150" y="196" width="206" height="52"/>
    <text class="callout-text" x="1166" y="227">axis labels</text>
    <text class="callout-accent" x="1166" y="243">0% to 100% scale text</text>

    <path class="callout-line" d="M 764 338 H 1112 V 324 H 1314"/>
    <circle class="callout-dot" cx="764" cy="338" r="5"/>
    <rect class="callout-box" x="1150" y="292" width="206" height="52"/>
    <text class="callout-text" x="1166" y="323">bars</text>
    <text class="callout-accent" x="1166" y="339">gradient metric rectangles</text>

    <path class="callout-line" d="M 846 548 H 1112 V 420 H 1314"/>
    <circle class="callout-dot" cx="846" cy="548" r="5"/>
    <rect class="callout-box" x="1150" y="388" width="206" height="52"/>
    <text class="callout-text" x="1166" y="419">labelBox</text>
    <text class="callout-accent" x="1166" y="435">dark chip behind category label</text>

    <path class="callout-line" d="M 946 610 H 1112 V 516 H 1314"/>
    <circle class="callout-dot" cx="946" cy="610" r="5"/>
    <rect class="callout-box" x="1150" y="484" width="206" height="52"/>
    <text class="callout-text" x="1166" y="515">valueRowFrame</text>
    <text class="callout-accent" x="1166" y="531">bordered numeric summary box</text>

    <path class="callout-line" d="M 840 618 H 1112 V 612 H 1314"/>
    <circle class="callout-dot" cx="840" cy="618" r="5"/>
    <rect class="callout-box" x="1150" y="580" width="206" height="52"/>
    <text class="callout-text" x="1166" y="611">value</text>
    <text class="callout-accent" x="1166" y="627">main numeric figure</text>

    <path class="callout-line" d="M 774 626 H 1110 V 708 H 1314"/>
    <circle class="callout-dot" cx="774" cy="626" r="5"/>
    <rect class="callout-box" x="1150" y="676" width="206" height="52"/>
    <text class="callout-text" x="1166" y="707">percent</text>
    <text class="callout-accent" x="1166" y="723">smaller trailing percent sign</text>
  </g>
</svg>
